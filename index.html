<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7d9dc" />
  <meta name="description" content="48の質問で、選び方のクセを動物タイプに。INNER ANIMALは、かわいい顔をした精密な動物タイプ診断です。" />
  <title>INNER ANIMAL | あなたの中の動物がわかる診断</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
  <link rel="icon" href="./assets/icons/icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar" aria-label="アプリヘッダー">
      <button class="ghost-btn icon-btn" id="backBtn" type="button" aria-label="戻る">←</button>
      <div class="brand-mini" aria-label="INNER ANIMAL">
        <span class="paw">✦</span>
        <span>INNER ANIMAL</span>
      </div>
      <button class="ghost-btn icon-btn" id="homeBtn" type="button" aria-label="ホームへ">⌂</button>
    </header>

    <main id="app" class="screen" aria-live="polite"></main>
  </div>

  <template id="homeTemplate">
    <section class="hero card soft-card">
      <p class="kicker">あなたの中の動物がわかる診断</p>
      <h1>INNER<br class="sp-only"> ANIMAL</h1>
      <p class="lead">48の質問で、選び方のクセを動物タイプに。</p>
      <div class="hero-animals" id="heroAnimals" aria-hidden="true"></div>
      <p class="micro-copy">見た目はかわいい動物診断。<br>中身は、あなたの選択のクセを丁寧に読みます。</p>
      <button class="primary-btn" id="startBtn" type="button">診断をはじめる</button>
      <button class="secondary-btn" id="animalsBtn" type="button">16のアニマルを見る</button>
      <button class="secondary-btn" id="resumeBtn" type="button">前回の結果を見る</button>
    </section>

    <section class="mini-panels" aria-label="特徴">
      <article>
        <span>01</span>
        <strong>48問の2択</strong>
        <p>直感で選ぶだけ。迷っても、今の気分で大丈夫です。</p>
      </article>
      <article>
        <span>02</span>
        <strong>16の動物タイプ</strong>
        <p>ネコ、キツネ、ミツバチ、イルカなど、かわいく見える結果に。</p>
      </article>
      <article>
        <span>03</span>
        <strong>なかよし相性</strong>
        <p>すべての動物との相性を％で見られます。</p>
      </article>
    </section>
  </template>

  <script src="./app.js" defer></script>
</body>
</html>
